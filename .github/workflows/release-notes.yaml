name: 'Generate Release Notes'

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          # Get all tags sorted by version, find the one before current
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            # No previous tag, use first commit
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Generate changelog
        id: changelog
        env:
          CURRENT_TAG: ${{ steps.prev_tag.outputs.current_tag }}
          PREV_TAG: ${{ steps.prev_tag.outputs.prev_tag }}
          REPO: ${{ github.repository }}
        run: |
          echo "Generating changelog from $PREV_TAG to $CURRENT_TAG"
          
          # Get all commits between tags
          ALL_COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s|%h" 2>/dev/null || git log --pretty=format:"%s|%h")
          
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          
          # Features
          FEATURES=$(echo "$ALL_COMMITS" | grep -iE "^\s*feat" | sed 's/|/ (/;s/$/)/' | sed 's/^/- /' || true)
          if [ -n "$FEATURES" ]; then
            echo "### ✨ Features" >> release_notes.md
            echo "$FEATURES" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          # Bug fixes
          FIXES=$(echo "$ALL_COMMITS" | grep -iE "^\s*fix" | sed 's/|/ (/;s/$/)/' | sed 's/^/- /' || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> release_notes.md
            echo "$FIXES" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          # Performance
          PERF=$(echo "$ALL_COMMITS" | grep -iE "^\s*perf" | sed 's/|/ (/;s/$/)/' | sed 's/^/- /' || true)
          if [ -n "$PERF" ]; then
            echo "### ⚡ Performance" >> release_notes.md
            echo "$PERF" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          # Refactor
          REFACTOR=$(echo "$ALL_COMMITS" | grep -iE "^\s*refactor" | sed 's/|/ (/;s/$/)/' | sed 's/^/- /' || true)
          if [ -n "$REFACTOR" ]; then
            echo "### ♻️ Refactoring" >> release_notes.md
            echo "$REFACTOR" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          # Chore/Build/CI
          CHORE=$(echo "$ALL_COMMITS" | grep -iE "^\s*(chore|build|ci)" | sed 's/|/ (/;s/$/)/' | sed 's/^/- /' || true)
          if [ -n "$CHORE" ]; then
            echo "### 🔧 Maintenance" >> release_notes.md
            echo "$CHORE" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          # Other changes (not matching any category)
          OTHER=$(echo "$ALL_COMMITS" | grep -ivE "^\s*(feat|fix|perf|refactor|chore|build|ci|docs|style|test)" | sed 's/|/ (/;s/$/)/' | sed 's/^/- /' || true)
          if [ -n "$OTHER" ]; then
            echo "### 📝 Other Changes" >> release_notes.md
            echo "$OTHER" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${CURRENT_TAG}" >> release_notes.md
          
          echo "=== Generated Release Notes ==="
          cat release_notes.md

      - name: Update release body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: release_notes.md
